<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Evolution of SOTA AI Models · 2018 – 2026</title>
<style>
  :root {
    --bg: #0b1020;
    --bg-2: #131a35;
    --grid: #243056;
    --axis: #5b6a9a;
    --text: #e6ecff;
    --muted: #94a3c8;
    --accent: #ffd166;

    --openai: #10a37f;
    --anthropic: #d97757;
    --google: #4285f4;
    --meta: #1877f2;
    --mistral: #ff7000;
    --xai: #c084fc;
    --deepseek: #00d4ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
  header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .subtitle { color: var(--muted); font-size: 13px; }
  .stage { position: relative; background: linear-gradient(180deg, var(--bg-2) 0%, #0e1530 100%); border: 1px solid #1d2750; border-radius: 12px; padding: 12px; }
  svg { display: block; width: 100%; height: auto; }

  .benchmark-picker {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 12px; padding: 10px 12px;
    background: var(--bg-2); border: 1px solid #1d2750; border-radius: 10px;
  }
  .benchmark-picker .lbl { font-size: 12px; color: var(--muted); align-self: center; margin-right: 4px; }
  .benchmark-picker label {
    font-size: 12.5px; cursor: pointer;
    padding: 6px 12px; border-radius: 6px;
    background: #1f2a52; border: 1px solid #2c3a6c;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .benchmark-picker label:hover { background: #2a376a; }
  .benchmark-picker label.active { background: var(--accent); color: #1a1f3a; border-color: var(--accent); font-weight: 600; }
  .benchmark-picker input { display: none; }

  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 12px; padding: 10px 12px; background: var(--bg-2); border: 1px solid #1d2750; border-radius: 10px; }
  button { background: #1f2a52; color: var(--text); border: 1px solid #2c3a6c; padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.15s; font-weight: 500; }
  button:hover { background: #2a376a; }
  button.primary { background: var(--accent); color: #1a1f3a; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #ffdd85; }
  label.ctrl { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 8px; }
  input[type=range] { accent-color: var(--accent); }
  input[type=checkbox] { accent-color: var(--accent); }
  .scrub { flex: 1 1 200px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; font-size: 12px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .caption { color: var(--muted); font-size: 12px; margin-top: 10px; line-height: 1.5; min-height: 36px; }
  .dot { cursor: default; transition: cy 0.5s ease, opacity 0.4s; }
  .dot:hover { stroke: #fff; stroke-width: 1.5; }
  .label { font-size: 10.5px; fill: var(--text); pointer-events: none; transition: y 0.5s ease, opacity 0.4s; }
  .leader { stroke: var(--muted); stroke-width: 0.6; opacity: 0.4; pointer-events: none; transition: opacity 0.4s; }
  .axis-label { font-size: 11px; fill: var(--axis); }
  .grid-line { stroke: var(--grid); stroke-width: 1; stroke-dasharray: 2 4; }
  .axis-line { stroke: var(--axis); stroke-width: 1; }
  .playhead { stroke: var(--accent); stroke-width: 1.5; opacity: 0.55; }
  .now-date { fill: var(--accent); font-size: 12px; font-weight: 600; }
  .benchmark-switch { font-size: 10px; fill: var(--muted); font-style: italic; }
  .saturation-band { fill: var(--accent); opacity: 0.06; }
  .saturation-label { fill: var(--accent); font-size: 10px; opacity: 0.7; }
  .y-axis-title { font-size: 11.5px; fill: var(--text); font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>The Evolution of State-of-the-Art AI Models</h1>
      <div class="subtitle">Different benchmarks tell different stories — which model is "best" depends on what you're measuring</div>
    </div>
    <div class="subtitle">GPT-1 → frontier · ~8 years</div>
  </header>

  <div class="benchmark-picker" id="benchmarkPicker">
    <span class="lbl">Benchmark:</span>
    <!-- Radio buttons inserted by JS -->
  </div>

  <div class="stage">
    <svg id="chart" viewBox="0 0 1240 600" preserveAspectRatio="xMidYMid meet" aria-label="Animated timeline of state of the art AI models"></svg>
  </div>

  <div class="controls">
    <button id="playBtn" class="primary">▶ Play</button>
    <button id="resetBtn">↺ Reset</button>
    <label class="ctrl">Speed
      <input id="speed" type="range" min="0.25" max="3" step="0.25" value="1" />
      <span id="speedLabel">1.0×</span>
    </label>
    <label class="ctrl">
      <input id="loop" type="checkbox" checked /> Loop
    </label>
    <label class="ctrl scrub">Scrub
      <input id="scrub" type="range" min="0" max="1000" step="1" value="0" />
    </label>
  </div>

  <div class="legend" id="legend"></div>
  <div class="caption" id="caption"></div>
</div>

<script>
/* =========================================================================
   BENCHMARK TRACKS
   Each track is a "view" with its own y-axis label, caption, and per-model
   scores. Models with no score on a track simply don't show up for that
   view (fade out).

   Each model's score for a track is either a number, or {early, late} where
   one benchmark gave way to a harder successor. The plot uses whichever
   score the model has reported (early models report early bench, frontier
   models report late bench), shown on the same y-axis with a vertical
   marker indicating the changeover.
========================================================================= */

    switchDate: "2024-09-01",

    caption: "MMLU through 2024, then GPQA Diamond after. Once MMLU saturated near 93% (its ~6.5% error ceiling), the field moved to harder PhD-level science questions. Frontier models cluster tightly at the top here: Gemini 3.1 Pro 94.3%, Opus 4.7 94.2%, GPT-5.5 ~94%. No clear winner in general knowledge — the race is essentially tied at the top."
  },
  coding: {
    title: "Software Engineering",

    lateBench: "SWE-bench Verified",

    caption: "HumanEval (simple Python problems) saturated by mid-2024, replaced by SWE-bench Verified — real GitHub issues the model must fix end-to-end. Anthropic's Claude has consistently led real-world coding, often by significant margins. Late-2025 to mid-2026: GPT-5.5 88.7%, Opus 4.7 87.6%, Gemini 3.1 Pro ~80%. Different ordering than General Knowledge."
  },

    title: "Math & Competition Reasoning",
    earlyBench: "MATH",

    caption: "MATH benchmark for the pre-reasoning era, then AIME 2025 — actual high school math olympiad problems — for the reasoning era. OpenAI's o-series and GPT-5 reasoning models dominate here, often reaching 100%. Several models (Gemini 3 Pro, Grok 4, Kimi K2) also reach 100% with extended thinking. The leaderboard reorders dramatically: reasoning models that lag on coding can lead on math."
  },
  frontier: {
    title: "Frontier Reasoning (HLE)",
    earlyBench: null,
    lateBench: "Humanity's Last Exam",
    switchDate: null,
    saturationLow: null, saturationHigh: null,
    saturationLabel: null,
    caption: "Humanity's Last Exam — 2,500 expert-curated questions designed to remain hard even for frontier models. Released January 2025, so pre-2025 models simply don't appear here. Best score today: Gemini 3.1 Pro Preview 44.7%, GPT-5.5 ~44%. Even the frontier still fails over half the questions. A different leaderboard yet again, and the sparsity itself shows how fast benchmarks have to evolve to stay relevant."

};

========================================================================= */
const MODELS = [

    scores: { general: 86.8, coding: 84.9, math: 60.1 } },

  { name: "LLaMA 3.1 405B",lab: "meta",      date: "2024-07-23",

  { name: "GPT-5",         lab: "openai",    date: "2025-08-07",
    scores: { general: 88.4, coding: 74.9, math: 94.6, frontier: 24.8 } },
  { name: "Gemini 3 Pro",  lab: "google",    date: "2025-11-18",
    scores: { general: 91.9, coding: 76.2, math: 100.0, frontier: 37.5 } },
  { name: "Claude Opus 4.5",lab: "anthropic",date: "2025-11-24",
    scores: { general: 87.0, coding: 80.9, math: 98.2, frontier: 25.2 } },
  { name: "Gemini 3.1 Pro",lab: "google",    date: "2026-02-26",
    scores: { general: 94.3, coding: 80.6, math: 100.0, frontier: 44.7 } },
  { name: "GPT-5.4",       lab: "openai",    date: "2026-03-05",
    scores: { general: 91.9, coding: 78.2, math: 100.0, frontier: 41.6 } },
  { name: "Claude Opus 4.7",lab: "anthropic",date: "2026-04-16",
    scores: { general: 94.2, coding: 87.6, math: 99.0, frontier: 36.9 } },
  { name: "GPT-5.5",       lab: "openai",    date: "2026-04-23",
    scores: { general: 94.0, coding: 88.7, math: 100.0, frontier: 44.3 } },
];

const LAB_INFO = {
  openai:    { name: "OpenAI",    color: "var(--openai)"    },
  anthropic: { name: "Anthropic", color: "var(--anthropic)" },
  google:    { name: "Google",    color: "var(--google)"    },
  meta:      { name: "Meta",      color: "var(--meta)"      },
  mistral:   { name: "Mistral",   color: "var(--mistral)"   },
  xai:       { name: "xAI",       color: "var(--xai)"       },
  deepseek:  { name: "DeepSeek",  color: "var(--deepseek)"  },
};

MODELS.forEach(m => { m.t = new Date(m.date).getTime(); });
MODELS.sort((a, b) => a.t - b.t);

/* =========================================================================
   STATE
========================================================================= */
let currentTrack = "general";

/* =========================================================================
   TIME AXIS (same dynamic window as before)
========================================================================= */
const T_DATA_START    = new Date("2018-04-01").getTime();
const T_INITIAL_RIGHT = new Date("2022-09-01").getTime();
const T_FULL_END      = new Date("2026-07-01").getTime();
const PHASE1_END = 0.25;

const SCORE_MIN = 0, SCORE_MAX = 100;
const W = 1240, H = 600;
const M = { top: 36, right: 40, bottom: 64, left: 60 };
const PW = W - M.left - M.right;
const PH = H - M.top - M.bottom;

function visibleRight(progress) {
  if (progress <= PHASE1_END) return T_INITIAL_RIGHT;
  const p2 = (progress - PHASE1_END) / (1 - PHASE1_END);
  return T_INITIAL_RIGHT + p2 * (T_FULL_END - T_INITIAL_RIGHT);
}
function playheadTime(progress) {
  if (progress <= PHASE1_END) {
    const p1 = progress / PHASE1_END;
    return T_DATA_START + p1 * (T_INITIAL_RIGHT - T_DATA_START);
  }
  const rightT = visibleRight(progress);
  const leadMs = (rightT - T_DATA_START) * 0.04;
  return rightT - leadMs;
}

let curLeft = T_DATA_START, curRight = T_INITIAL_RIGHT;
function xScale(t) { return M.left + ((t - curLeft) / (curRight - curLeft)) * PW; }
function yScale(s) { return M.top + PH - ((s - SCORE_MIN) / (SCORE_MAX - SCORE_MIN)) * PH; }

const svg = document.getElementById("chart");
const NS = "http://www.w3.org/2000/svg";
function el(tag, attrs = {}, text = null) {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (text != null) e.textContent = text;
  return e;
}

/* =========================================================================
   STATIC LAYERS
========================================================================= */
// Saturation band (recreated per track, so it's "semi-static")
let satBand = el("rect", { class: "saturation-band" });
let satLabel = el("text", { class: "saturation-label" });
svg.appendChild(satBand);
svg.appendChild(satLabel);

// Y axis grid
for (let s = 0; s <= 100; s += 20) {
  const y = yScale(s);
  svg.appendChild(el("line", { x1: M.left, y1: y, x2: M.left + PW, y2: y, class: "grid-line" }));
  svg.appendChild(el("text", { x: M.left - 8, y: y + 4, "text-anchor": "end", class: "axis-label" }, s + "%"));
}
const yAxisTitle = el("text", {
  x: M.left - 45, y: M.top + PH / 2,
  transform: `rotate(-90, ${M.left - 45}, ${M.top + PH / 2})`,
  "text-anchor": "middle", class: "y-axis-title"
}, "Score");
svg.appendChild(yAxisTitle);

svg.appendChild(el("line", { x1: M.left, y1: M.top + PH, x2: M.left + PW, y2: M.top + PH, class: "axis-line" }));
svg.appendChild(el("line", { x1: M.left, y1: M.top, x2: M.left, y2: M.top + PH, class: "axis-line" }));

/* =========================================================================
   DYNAMIC LAYERS
========================================================================= */
const yearTickGroup = el("g", {});
svg.appendChild(yearTickGroup);
const YEARS = [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026];
const yearTicks = YEARS.map(y => {
  const t = new Date(`${y}-01-01`).getTime();
  const line = el("line", { y1: M.top, y2: M.top + PH, class: "grid-line" });
  const label = el("text", { y: M.top + PH + 18, "text-anchor": "middle", class: "axis-label" }, String(y));
  yearTickGroup.appendChild(line);
  yearTickGroup.appendChild(label);
  return { t, line, label };
});

// Benchmark switch line — track-dependent
const switchLine = el("line", {
  y1: M.top, y2: M.top + PH,
  stroke: "var(--accent)", "stroke-width": 1, "stroke-dasharray": "3 4", opacity: 0
});
svg.appendChild(switchLine);
const switchLabel = el("text", { y: M.top + 28, class: "benchmark-switch", opacity: 0 }, "");
svg.appendChild(switchLabel);

const leaderGroup = el("g", {});
svg.appendChild(leaderGroup);
const dotGroup = el("g", {});
svg.appendChild(dotGroup);
const labelGroup = el("g", {});
svg.appendChild(labelGroup);

MODELS.forEach(m => {
  const color = LAB_INFO[m.lab].color;
  m._dot = el("circle", {
    r: 0, fill: color, "fill-opacity": 0.85, stroke: color, "stroke-opacity": 0.9, class: "dot"
  });
  const title = el("title", {}, m.name);
  m._titleNode = title;
  m._dot.appendChild(title);
  dotGroup.appendChild(m._dot);
  m._leader = el("line", { class: "leader", opacity: 0 });
  leaderGroup.appendChild(m._leader);
  m._label = el("text", { class: "label", opacity: 0 }, m.name);
  labelGroup.appendChild(m._label);
});

const playhead = el("line", { y1: M.top, y2: M.top + PH, class: "playhead" });
svg.appendChild(playhead);
const nowText = el("text", { y: M.top - 12, "text-anchor": "middle", class: "now-date" }, "Jun 2018");
svg.appendChild(nowText);

/* =========================================================================
   BENCHMARK PICKER UI
========================================================================= */
const picker = document.getElementById("benchmarkPicker");
const trackKeys = Object.keys(TRACKS);
trackKeys.forEach((key, i) => {
  const lbl = document.createElement("label");
  lbl.dataset.track = key;
  if (key === currentTrack) lbl.classList.add("active");
  const inp = document.createElement("input");
  inp.type = "radio"; inp.name = "benchmark"; inp.value = key;
  if (key === currentTrack) inp.checked = true;
  inp.addEventListener("change", () => setTrack(key));
  lbl.appendChild(inp);
  lbl.appendChild(document.createTextNode(TRACKS[key].title));
  picker.appendChild(lbl);
});

const captionEl = document.getElementById("caption");

function setTrack(key) {
  currentTrack = key;
  // Update active radio styling
  Array.from(picker.querySelectorAll("label")).forEach(l => {
    l.classList.toggle("active", l.dataset.track === key);
  });
  // Update saturation band, switch marker, caption, y-axis title
  const tr = TRACKS[key];
  if (tr.saturationLow != null) {
    satBand.setAttribute("x", M.left);
    satBand.setAttribute("y", yScale(tr.saturationHigh));
    satBand.setAttribute("width", PW);
    satBand.setAttribute("height", yScale(tr.saturationLow) - yScale(tr.saturationHigh));
    satBand.setAttribute("opacity", 0.06);
    satLabel.setAttribute("x", M.left + 6);
    satLabel.setAttribute("y", yScale(tr.saturationHigh) - 4);
    satLabel.textContent = tr.saturationLabel;
    satLabel.setAttribute("opacity", 0.7);
  } else {
    satBand.setAttribute("opacity", 0);
    satLabel.setAttribute("opacity", 0);
  }
  // Y-axis title
  if (tr.earlyBench && tr.lateBench) {
    yAxisTitle.textContent = `${tr.earlyBench} → ${tr.lateBench} score`;
  } else if (tr.lateBench) {
    yAxisTitle.textContent = `${tr.lateBench} score`;
  } else if (tr.earlyBench) {
    yAxisTitle.textContent = `${tr.earlyBench} score`;
  }
  // Caption
  captionEl.textContent = tr.caption;
  // Render with the new track
  render();
}

/* =========================================================================
   LABEL COLLISION AVOIDANCE
========================================================================= */
const LABEL_H = 13;
function approxLabelWidth(name) { return Math.max(28, name.length * 5.6 + 8); }
const CANDIDATES = [
  [8, -8], [8, 6], [8, -22], [8, 20], [8, -36], [8, 34],
  [-8, -8], [-8, 6], [-8, -22], [-8, 20],
  [8, -50], [8, 48], [-8, -50], [-8, 48],
  [8, -64], [8, 62],
];
function rectsOverlap(a, b) {
  return !(a.x + a.w < b.x || b.x + b.w < a.x || a.y + a.h < b.y || b.y + b.h < a.y);
}
function placeLabels(visibleModels) {
  const placed = [];
  const order = visibleModels.slice().sort((a, b) => {
    const ka = a.t * 1e-12 + (a._score || 0) * 0.01;
    const kb = b.t * 1e-12 + (b._score || 0) * 0.01;
    return kb - ka;
  });
  for (const m of order) {
    const cx = m._px, cy = m._py;
    const w = approxLabelWidth(m.name);
    let chosen = null;
    for (const [dx, dy] of CANDIDATES) {
      const anchor = dx >= 0 ? "start" : "end";
      const lx = cx + dx;
      const ly = cy + dy;
      const boxX = dx >= 0 ? lx : lx - w;
      const boxY = ly - LABEL_H + 2;
      const rect = { x: boxX, y: boxY, w, h: LABEL_H };
      if (rect.x < M.left - 2 || rect.x + rect.w > M.left + PW + 2) continue;
      if (rect.y < M.top - 18 || rect.y + rect.h > M.top + PH + 4) continue;
      let collides = false;
      for (const p of placed) {
        if (rectsOverlap(rect, p.rect)) { collides = true; break; }
      }
      if (collides) continue;
      chosen = { lx, ly, anchor, rect, dx, dy };
      break;
    }
    if (!chosen) {
      chosen = { lx: cx + 8, ly: M.top - 6 - placed.length * 12, anchor: "start",
                 rect: { x: cx + 8, y: M.top - 6 - placed.length * 12 - LABEL_H, w, h: LABEL_H },
                 dx: 8, dy: -50 };
    }
    placed.push({ m, ...chosen });
  }
  for (const p of placed) {
    p.m._label.setAttribute("x", p.lx);
    p.m._label.setAttribute("y", p.ly);
    p.m._label.setAttribute("text-anchor", p.anchor);
    p.m._leader.setAttribute("x1", p.m._px);
    p.m._leader.setAttribute("y1", p.m._py);
    const leaderEndX = p.dx >= 0 ? p.lx - 2 : p.lx + 2;
    const leaderEndY = p.ly + (p.dy < 0 ? 3 : -3);
    p.m._leader.setAttribute("x2", leaderEndX);
    p.m._leader.setAttribute("y2", leaderEndY);
  }
}

/* =========================================================================
   ANIMATION & RENDERING
========================================================================= */
const BASE_TOTAL_MS = 32000;
let progress = 0, playing = false, lastFrame = null, speed = 1, loop = true;

const playBtn   = document.getElementById("playBtn");
const resetBtn  = document.getElementById("resetBtn");
const speedInput= document.getElementById("speed");
const speedLabel= document.getElementById("speedLabel");
const loopInput = document.getElementById("loop");
const scrub     = document.getElementById("scrub");

const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function render() {
  const tr = TRACKS[currentTrack];

  curLeft = T_DATA_START;
  curRight = visibleRight(progress);

  // Year ticks
  for (const yt of yearTicks) {
    const x = xScale(yt.t);
    const inside = x >= M.left - 0.5 && x <= M.left + PW + 0.5;
    yt.line.setAttribute("x1", x); yt.line.setAttribute("x2", x);
    yt.line.setAttribute("opacity", inside ? 1 : 0);
    yt.label.setAttribute("x", x);
    yt.label.setAttribute("opacity", inside ? 1 : 0);
  }

  // Benchmark switch marker (per-track)
  if (tr.switchDate) {
    const sT = new Date(tr.switchDate).getTime();
    const sx = xScale(sT);
    const visibleSwitch = sT <= curRight && sT >= curLeft;
    switchLine.setAttribute("x1", sx); switchLine.setAttribute("x2", sx);
    switchLine.setAttribute("opacity", visibleSwitch ? 0.45 : 0);
    switchLabel.setAttribute("x", sx + 6);
    switchLabel.textContent = `${tr.earlyBench} → ${tr.lateBench}`;
    switchLabel.setAttribute("opacity", visibleSwitch ? 1 : 0);
  } else {
    switchLine.setAttribute("opacity", 0);
    switchLabel.setAttribute("opacity", 0);
  }

  // Playhead
  const nowT = playheadTime(progress);
  const px = xScale(nowT);
  playhead.setAttribute("x1", px); playhead.setAttribute("x2", px);
  nowText.setAttribute("x", px);
  const d = new Date(nowT);
  nowText.textContent = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;

  // Dots
  const visibleModels = [];
  for (const m of MODELS) {
    const score = m.scores[currentTrack];
    m._score = score;
    m._px = xScale(m.t);
    const hasScore = (typeof score === "number");
    m._py = hasScore ? yScale(score) : yScale(0);
    m._dot.setAttribute("cx", m._px);
    m._dot.setAttribute("cy", m._py);

    // Update tooltip
    const benchName = (m.t < (tr.switchDate ? new Date(tr.switchDate).getTime() : Infinity))
      ? (tr.earlyBench || tr.lateBench || "—")
      : (tr.lateBench || tr.earlyBench || "—");
    m._titleNode.textContent = `${m.name} · ${LAB_INFO[m.lab].name}\n${m.date} · ${hasScore ? score + "% (" + benchName + ")" : "not evaluated on " + (tr.lateBench || tr.earlyBench)}`;

    if (m.t <= nowT && hasScore) {
      const arrivalProgress = (m.t - T_INITIAL_RIGHT) / (T_FULL_END - T_INITIAL_RIGHT);
      const since = Math.max(0, progress - Math.max(0, arrivalProgress));
      const r = 5.5 + 1.5 * Math.sin(Math.min(1, since * 12) * Math.PI);
      m._dot.setAttribute("r", Math.max(5.5, r));
      m._dot.setAttribute("fill-opacity", 0.85);
      visibleModels.push(m);
    } else {
      m._dot.setAttribute("r", 0);
      m._label.setAttribute("opacity", 0);
      m._leader.setAttribute("opacity", 0);
    }
  }

  placeLabels(visibleModels);
  for (const m of visibleModels) {
    m._label.setAttribute("opacity", 1);
    m._leader.setAttribute("opacity", 0.45);
  }

  scrub.value = String(Math.round(progress * 1000));
}

function tick(ts) {
  if (!playing) return;
  if (lastFrame == null) lastFrame = ts;
  const dt = ts - lastFrame;
  lastFrame = ts;
  const delta = (dt / BASE_TOTAL_MS) * speed;
  let next = progress + delta;
  if (next >= 1) {
    if (loop) next = 0;
    else { next = 1; playing = false; playBtn.textContent = "▶ Play"; }
  }
  progress = next;
  render();
  if (playing) requestAnimationFrame(tick);
}

playBtn.addEventListener("click", () => {
  playing = !playing;
  playBtn.textContent = playing ? "❚❚ Pause" : "▶ Play";
  if (playing) {
    lastFrame = null;
    if (progress >= 1) progress = 0;
    requestAnimationFrame(tick);
  }
});
resetBtn.addEventListener("click", () => {
  playing = false; playBtn.textContent = "▶ Play"; lastFrame = null;
  progress = 0; render();
});
speedInput.addEventListener("input", e => {
  speed = parseFloat(e.target.value);
  speedLabel.textContent = speed.toFixed(2) + "×";
});
loopInput.addEventListener("change", e => { loop = e.target.checked; });
scrub.addEventListener("input", e => {
  progress = parseInt(e.target.value, 10) / 1000;
  render();
});

// Legend
const legend = document.getElementById("legend");
Object.entries(LAB_INFO).forEach(([key, info]) => {
  const s = document.createElement("span");
  s.innerHTML = `<i style="background:${info.color}"></i>${info.name}`;
  legend.appendChild(s);
});

// Initial render
setTrack("general");
</script>
</body>
